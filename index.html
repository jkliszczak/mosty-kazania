<style>
  :root{
    --paper:#F4F4F1;
    --card:#FBFBF9;
    --ink:#17181B;
    --muted:#6F706B;
    --faint:#9A9A93;
    --line:#E3E2DC;
    --accent:#2B5F74;
    --accent-soft:#E7EEF1;
    --serif:"Spectral",Georgia,serif;
    --sans:"Hanken Grotesk",system-ui,sans-serif;
    --mono:"JetBrains Mono",ui-monospace,monospace;
    --maxw:920px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    background:var(--paper);color:var(--ink);
    font-family:var(--sans);font-weight:400;line-height:1.6;
    -webkit-font-smoothing:antialiased;
    padding-bottom:96px;
  }
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 24px}
  a{color:inherit}
  ::selection{background:var(--accent);color:#fff}

  /* ---------- bridge motif ---------- */
  .bridge{display:inline-flex;align-items:center;gap:8px}
  .bridge .span{height:1px;width:26px;background:var(--faint);position:relative}

  /* ---------- masthead ---------- */

  .masthead{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
  .word{display:flex;align-items:center;gap:12px}
  .word .name{font-family:var(--serif);font-weight:600;font-size:21px;letter-spacing:-.01em}

  .kicker{font-family:var(--mono);font-size:11px;letter-spacing:.18em;

  .links{display:flex;gap:20px;align-items:center}
  .links a{font-size:13.5px;color:var(--muted);text-decoration:none;
    display:inline-flex;align-items:center;gap:6px;transition:color .15s}
  .links a:hover{color:var(--ink)}
  .links svg{width:15px;height:15px;display:block}
  .demo-pill{font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;
    color:var(--accent);background:var(--accent-soft);
    padding:4px 9px;border-radius:999px;white-space:nowrap}

  /* ---------- hero / latest ---------- */

  .hero .eyebrow{font-family:var(--mono);font-size:11.5px;letter-spacing:.15em;
    text-transform:uppercase;color:var(--muted);margin-bottom:18px;
    display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .hero .eyebrow .tag{color:var(--accent)}
  .hero h1{font-family:var(--serif);font-weight:500;
    font-size:clamp(30px,5.4vw,52px);line-height:1.08;letter-spacing:-.02em;
    max-width:28ch}
  .hero .by{margin-top:18px;font-size:16px;color:var(--muted)}
  .hero .by b{color:var(--ink);font-weight:500}
  .hero .desc{margin-top:16px;font-size:17px;max-width:60ch;color:#33342F}
  .hero .scripture{margin-top:14px;font-family:var(--serif);font-style:italic;
    font-size:16px;color:var(--accent)}
  .hero .cta{margin-top:30px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}

  .play-btn{appearance:none;border:0;cursor:pointer;font-family:var(--sans);
    display:inline-flex;align-items:center;gap:11px;
    background:var(--ink);color:#fff;font-size:15px;font-weight:500;
    padding:13px 22px 13px 18px;border-radius:999px;transition:transform .15s,opacity .15s}

  .pill.active{background:var(--ink);border-color:var(--ink);color:#fff}

  li.row:hover{background:var(--card)}
  .row-inner{display:grid;grid-template-columns:96px 1fr auto auto auto auto;align-items:center;
    gap:18px;padding:18px 0}
  .row .date{font-family:var(--mono);font-size:12px;color:var(--muted);white-space:nowrap}

  .row .go{width:38px;height:38px;border-radius:50%;border:1px solid var(--line);

  li.row:hover .go{background:var(--ink);border-color:var(--ink);color:#fff}

  .row .dl,.row .sh{width:38px;height:38px;border-radius:50%;border:1px solid var(--line);

  .row .dl:hover{border-color:var(--accent);color:var(--accent)}
  .row .sh:hover{border-color:var(--accent);color:var(--accent)}
  .psh{flex:none;width:34px;height:34px;border:0;background:transparent;cursor:pointer;
    color:var(--faint);border-radius:50%;display:grid;place-items:center;transition:color .15s,background .15s}
  .psh:hover{color:var(--ink);background:var(--line)}
  .toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%) translateY(12px);

    transition:opacity .2s,transform .2s;z-index:100}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .pdl{flex:none;width:34px;height:34px;border:0;background:transparent;cursor:pointer;
    color:var(--faint);border-radius:50%;display:grid;place-items:center;transition:color .15s,background .15s}
  .pdl:hover{color:var(--ink);background:var(--line)}

  .empty{padding:60px 8px;text-align:center;color:var(--muted)}
  .empty p{font-family:var(--serif);font-size:18px;color:var(--ink);margin-bottom:6px}

  footer.site{padding:48px 0 30px;color:var(--faint);font-size:13px;
    display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap}
  footer .bridge .span{width:40px}

  /* ---------- sticky player (the bridge) ---------- */
  .player{position:fixed;left:0;right:0;bottom:0;z-index:50;
    background:rgba(251,251,249,.92);backdrop-filter:blur(12px);
    border-top:1px solid var(--line);transform:translateY(110%);
    transition:transform .28s cubic-bezier(.2,.7,.3,1)}
  .player.up{transform:translateY(0)}
  .player-inner{max-width:var(--maxw);margin:0 auto;padding:13px 24px;
    display:flex;align-items:center;gap:18px}
  .pp{width:46px;height:46px;flex:none;border:0;border-radius:50%;cursor:pointer;
    background:var(--accent);color:#fff;display:grid;place-items:center;transition:transform .15s}

  .pmeta{flex:none;width:210px;min-width:0}
  .pmeta .pt{font-family:var(--serif);font-weight:500;font-size:15px;

  .pmeta .ps{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ptrack{flex:1;display:flex;align-items:center;gap:12px;min-width:0}
  .ptime{font-family:var(--mono);font-size:11.5px;color:var(--muted);white-space:nowrap}
  /* bridge-line seek bar */
  .seek{flex:1;-webkit-appearance:none;appearance:none;height:18px;background:transparent;cursor:pointer}
  .seek::-webkit-slider-runnable-track{height:2px;border-radius:2px;

  .seek::-moz-range-track{height:2px;border-radius:2px;background:var(--line)}
  .seek::-moz-range-progress{height:2px;border-radius:2px;background:var(--accent)}
  .seek::-webkit-slider-thumb{-webkit-appearance:none;width:11px;height:11px;border-radius:50%;
    background:var(--accent);margin-top:-4.5px;border:2px solid var(--card)}
  .seek::-moz-range-thumb{width:11px;height:11px;border-radius:50%;background:var(--accent);border:2px solid var(--card)}
  .pclose{flex:none;width:34px;height:34px;border:0;background:transparent;cursor:pointer;
    color:var(--faint);border-radius:50%;display:grid;place-items:center;transition:color .15s,background .15s}
  .pclose:hover{color:var(--ink);background:var(--line)}

  @media (max-width:680px){
    .row-inner{grid-template-columns:1fr auto;gap:10px 14px;padding:16px 6px}
    .row .date{grid-column:1/-1;order:-1}

    .row .dl,.row .sh{display:none}
    .hero{padding-top:34px;padding-bottom:30px}
    .pmeta{width:auto;flex:1}
    .ptrack{display:none}

  }
  @media (prefers-reduced-motion:reduce){
    *{transition:none!important;animation:none!important}
  }

  .reveal{opacity:0;transform:translateY(10px);animation:rise .6s ease forwards}
  @keyframes rise{to{opacity:1;transform:none}}
</style>

<script>
/* ---------- sample data (demo) ---------- */
const SAMPLE = [
  {data:"2026-06-22",tytul:"Most do Ojca",mowca:"Paweł Kowalczyk",seria:"Ewangelia Jana",fragment:"Jan 14,1–6",audio:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"},
  {data:"2026-06-15",tytul:"Łaska, której nie da się zasłużyć",mowca:"Anna Wiśniewska",seria:"Listy Pawła",fragment:"Efezjan 2,1–10",audio:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"},
  {data:"2026-06-08",tytul:"Kiedy Bóg milczy",mowca:"Marek Lewandowski",seria:"Psalmy na trudny czas",fragment:"Psalm 13",audio:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3"},
  {data:"2026-06-01",tytul:"Wspólnota, która niesie",mowca:"Paweł Kowalczyk",seria:"Kościół w działaniu",fragment:"Dzieje 2,42–47",audio:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3"},
  {data:"2026-05-25",tytul:"Zagubiona owca",mowca:"Anna Wiśniewska",seria:"Przypowieści Jezusa",fragment:"Łukasz 15,1–7",audio:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3"},
  {data:"2026-05-18",tytul:"Pokój, który przewyższa rozum",mowca:"Marek Lewandowski",seria:"Listy Pawła",fragment:"Filipian 4,4–9",audio:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-6.mp3"},
  {data:"2026-05-11",tytul:"Nowe narodzenie",mowca:"Paweł Kowalczyk",seria:"Ewangelia Jana",fragment:"Jan 3,1–16",audio:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-7.mp3"},
];

/* ---------- helpers ---------- */
const $=s=>document.querySelector(s);
const audio=$("#audio");
let DATA=[], current=null, isDemo=false;

function parseDate(s){
  s=(s||"").trim();
  let m=s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if(m) return new Date(+m[1],+m[2]-1,+m[3]);
  m=s.match(/^(\d{1,2})[.\/-](\d{1,2})[.\/-](\d{4})/);
  if(m) return new Date(+m[3],+m[2]-1,+m[1]);
  const d=new Date(s); return isNaN(d)?new Date(0):d;
}
const MIES=["stycznia","lutego","marca","kwietnia","maja","czerwca","lipca","sierpnia","września","października","listopada","grudnia"];
function fmtLong(d){return d.getDate()+" "+MIES[d.getMonth()]+" "+d.getFullYear();}
function fmtShort(d){return String(d.getDate()).padStart(2,"0")+"."+String(d.getMonth()+1).padStart(2,"0")+"."+d.getFullYear();}
function fmtTime(s){if(!s||isNaN(s))return"0:00";const m=Math.floor(s/60),x=Math.floor(s%60);return m+":"+String(x).padStart(2,"0");}

/* parse filename: "2026-06-22 | Mówca | Tytuł | Seria | Fragment.mp3" */
function parseFilename(name){
  const base=name.replace(/\.[^/.]+$/,"");
  const parts=base.split("|").map(p=>p.trim());
  return {
    data:  parts[0]||"",
    mowca: parts[1]||"",
    tytul: parts[2]||base,
    seria: parts[3]||"",
    fragment: parts[4]||"",
  };
}

async function fetchDrivePage(token){
  let url="https://www.googleapis.com/drive/v3/files"
    +"?q="+encodeURIComponent("'"+CONFIG.FOLDER_ID+"' in parents and trashed=false")
    +"&key="+CONFIG.API_KEY
    +"&fields=nextPageToken,files(id,name)"
    +"&orderBy=name+desc"
    +"&pageSize=100";
  if(token) url+="&pageToken="+token;
  const res=await fetch(url);
  if(!res.ok) throw new Error("Drive API "+res.status);
  return res.json();
}

async function loadData(){
  if(CONFIG.API_KEY && CONFIG.FOLDER_ID){
    try{
      let files=[], token=null;
      do{
        const page=await fetchDrivePage(token);
        files=files.concat(page.files||[]);
        token=page.nextPageToken||null;
      }while(token);
      const audio_files=files.filter(f=>/\.(mp3|m4a|wav|ogg|aac)$/i.test(f.name));
      if(audio_files.length) return audio_files.map(normalizeFromFile);
      throw new Error("brak plików audio w folderze");
    }catch(e){ console.warn("Drive API — używam danych demo:",e); }
  }
  isDemo=true;
  return SAMPLE.map(normalizeSample);
}

function normalizeFromFile(file){
  const meta=parseFilename(file.name);
  return {
    data: meta.data, _d: parseDate(meta.data),
    tytul: meta.tytul,
    mowca: meta.mowca,
    seria: meta.seria,
    fragment: meta.fragment,
    opis: "",
    audio: "https://www.googleapis.com/drive/v3/files/"+file.id+"?alt=media&key="+CONFIG.API_KEY,
    okladka: ""
  };
}

function normalizeSample(o){
  return {
    data:o.data||"", _d:parseDate(o.data),
    tytul:o.tytul||"Bez tytułu",
    mowca:o.mowca||"", seria:o.seria||"",
    opis:"", fragment:o.fragment||"",
    audio:o.audio||"", okladka:""
  };
}

/* ---------- rendering ---------- */
const state={q:"",seria:"",mowca:""};

function filtered(){
  return DATA.filter(s=>{
    if(state.seria && s.seria!==state.seria) return false;
    if(state.mowca && s.mowca!==state.mowca) return false;
    if(state.q){
      const t=(s.tytul+" "+s.mowca+" "+s.seria+" "+s.opis).toLowerCase();
      if(!t.includes(state.q.toLowerCase())) return false;
    }
    return true;
  });
}

function renderHero(){
  const s=DATA[0]; if(!s){$("#hero").innerHTML="";return;}
  $("#hero").innerHTML=`
    <div class="reveal">
      <div class="eyebrow">
        <span>Najnowsza inspiracja</span>
        <span>${fmtLong(s._d)}</span>
        ${s.seria?`<span class="tag">${esc(s.seria)}</span>`:""}
      </div>
      <h1>${esc(s.tytul)}</h1>
      ${s.mowca?`<div class="by"><b>${esc(s.mowca)}</b></div>`:""}
      ${s.opis?`<p class="desc">${esc(s.opis)}</p>`:""}
      ${s.fragment?`<div class="scripture">${esc(s.fragment)}</div>`:""}
      <div class="cta">
        <button class="play-btn" onclick="playIndex(0)">
          <span class="ic"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></span>
          Słuchaj inspiracji
        </button>
      </div>
    </div>`;
}

function renderControls(){
  const series=[...new Set(DATA.map(s=>s.seria).filter(Boolean))];
  const sp=$("#seriesPills");
  sp.innerHTML=`<button class="pill ${state.seria===""?"active":""}" data-s="">Wszystkie serie</button>`+
    series.map(x=>`<button class="pill ${state.seria===x?"active":""}" data-s="${esc(x)}">${esc(x)}</button>`).join("");
  sp.querySelectorAll(".pill").forEach(b=>b.onclick=()=>{state.seria=b.dataset.s;renderControls();renderList();});

  const speakers=[...new Set(DATA.map(s=>s.mowca).filter(Boolean))];
  const sel=$("#speaker");
  sel.innerHTML=`<option value="">Wszyscy mówcy</option>`+
    speakers.map(x=>`<option value="${esc(x)}" ${state.mowca===x?"selected":""}>${esc(x)}</option>`).join("");
}

function renderList(){
  const items=filtered();
  $("#count").textContent=items.length+(items.length===1?" inspiracja":(items.length<5&&items.length>1?" inspiracje":" inspiracji"));
  const list=$("#list");
  if(!items.length){
    list.innerHTML=`<div class="empty"><p>Nic nie znaleźliśmy</p><span>Spróbuj innego słowa albo wyczyść filtry.</span></div>`;
    return;
  }
  list.innerHTML=items.map(s=>{
    const i=DATA.indexOf(s);
    const on=current===i?"playing":"";
    return `<li class="row ${on}" onclick="playIndex(${i})">
      <div class="row-inner">
        <span class="date">${fmtShort(s._d)}</span>
        <div class="main">
          <div class="ttl">${esc(s.tytul)}</div>
          <div class="sub">${esc(s.mowca)}${s.fragment?" · "+esc(s.fragment):""}</div>
        </div>
        ${s.seria?(()=>{const c=seriaColor(s.seria);return`<span class="seria" style="background:${c.bg};color:${c.fg}">${esc(s.seria)}</span>`;})():`<span></span>`}
        <button class="sh" onclick="shareInspiracja(${i},event)" aria-label="Udostępnij"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="m8.59 13.51 6.83 3.98M15.41 6.51l-6.82 3.98"/></svg></button>
        <button class="dl" onclick="downloadAudio(${i},event)" aria-label="Pobierz"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v10M7 15l5 5 5-5"/><path d="M4 20h16"/></svg></button>
        <span class="go"><svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></span>
      </div>
    </li>`;
  }).join("");
}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

const SERIA_PALETTE=[
  {bg:"#E8F4F8",fg:"#1A6A8A"},{bg:"#EEF4E8",fg:"#3A6E1A"},{bg:"#F5EEF8",fg:"#6A2A8A"},
  {bg:"#FEF4E8",fg:"#8A5A1A"},{bg:"#F8E8E8",fg:"#8A1A1A"},{bg:"#E8F8F4",fg:"#1A6A5A"},
  {bg:"#F8F4E8",fg:"#6A5A1A"},{bg:"#EEE8F8",fg:"#3A1A8A"},{bg:"#F8EEF4",fg:"#8A1A5A"},
  {bg:"#E8EEF8",fg:"#1A3A8A"},
];
function seriaColor(name){
  let h=0; for(let i=0;i<name.length;i++) h=(h*31+name.charCodeAt(i))>>>0;
  return SERIA_PALETTE[h%SERIA_PALETTE.length];
}

/* ---------- player ---------- */
function playIndex(i){
  const s=DATA[i]; if(!s) return;
  if(current===i){ togglePlay(); return; }
  current=i;
  if(!s.audio){ alert("Brak pliku audio dla tej inspiracji."); return; }
  audio.src=s.audio; audio.play().catch(()=>{});
  $("#pTitle").textContent=s.tytul;
  $("#pSub").textContent=[s.mowca,s.seria].filter(Boolean).join(" · ");
  $("#player").classList.add("up");
  renderList();
}
function togglePlay(){ audio.paused?audio.play():audio.pause(); }
function setPpIcon(playing){
  $("#ppIcon").innerHTML=playing
    ? '<path d="M6 5h4v14H6zM14 5h4v14h-4z"/>'
    : '<path d="M8 5v14l11-7z"/>';
}
$("#pp").onclick=togglePlay;
$("#pClose").onclick=()=>{audio.pause();audio.removeAttribute("src");audio.load();
  $("#player").classList.remove("up");current=null;renderList();
  localStorage.removeItem("mosty_current");localStorage.removeItem("mosty_time");};
audio.addEventListener("play",()=>setPpIcon(true));
audio.addEventListener("pause",()=>setPpIcon(false));
audio.addEventListener("timeupdate",()=>{
  const p=audio.duration?audio.currentTime/audio.duration:0;
  const seek=$("#seek");seek.value=p*1000;seek.style.setProperty("--p",(p*100)+"%");
  $("#pCur").textContent=fmtTime(audio.currentTime);
});
audio.addEventListener("loadedmetadata",()=>$("#pDur").textContent=fmtTime(audio.duration));
audio.addEventListener("ended",()=>setPpIcon(false));
$("#seek").addEventListener("input",e=>{
  if(audio.duration) audio.currentTime=(e.target.value/1000)*audio.duration;
});

/* ---------- download ---------- */
async function downloadAudio(i, e){
  e.stopPropagation();
  const s=DATA[i]; if(!s||!s.audio) return;
  try{
    const res=await fetch(s.audio);
    const blob=await res.blob();
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;
    a.download=(s.tytul||"inspiracja")+".mp3";
    a.click();
    setTimeout(()=>URL.revokeObjectURL(url),10000);
  }catch(_){ window.open(s.audio,"_blank"); }
}
$("#pDl").onclick=()=>{ if(current!==null) downloadAudio(current,{stopPropagation:()=>{}}); };

/* ---------- localStorage ---------- */
function saveState(){
  if(current===null) return;
  localStorage.setItem("mosty_current", current);
  localStorage.setItem("mosty_time", audio.currentTime||0);
}
function restoreState(){
  const i=localStorage.getItem("mosty_current");
  const t=parseFloat(localStorage.getItem("mosty_time")||0);
  if(i===null||!DATA[+i]) return;
  current=+i;
  const s=DATA[current];
  audio.src=s.audio;
  audio.currentTime=t;
  $("#pTitle").textContent=s.tytul;
  $("#pSub").textContent=[s.mowca,s.seria].filter(Boolean).join(" · ");
  $("#player").classList.add("up");
  renderList();
}
audio.addEventListener("timeupdate",saveState);

/* ---------- share ---------- */
let toastTimer=null;
function showToast(){
  const t=$("#toast");t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove("show"),2200);
}
function shareInspiracja(i,e){
  e.stopPropagation();
  const s=DATA[i]; if(!s) return;
  const url=location.origin+location.pathname+"?d="+encodeURIComponent(s.data);
  navigator.clipboard.writeText(url).then(showToast).catch(()=>{
    prompt("Skopiuj link:",url);
  });
}
$("#pSh").onclick=()=>{ if(current!==null) shareInspiracja(current,{stopPropagation:()=>{}}); };

/* ---------- search ---------- */
$("#q").addEventListener("input",e=>{state.q=e.target.value;renderList();});
$("#speaker").addEventListener("change",e=>{state.mowca=e.target.value;renderList();});

/* ---------- boot ---------- */
(async()=>{
  DATA=await loadData();
  DATA.sort((a,b)=>b._d-a._d);
  if(isDemo) $("#demoPill").hidden=false;
  renderHero();renderControls();renderList();
  const deepD=new URLSearchParams(location.search).get("d");
  if(deepD){
    const di=DATA.findIndex(s=>s.data===deepD);
    if(di>=0){ playIndex(di); DATA[di]&&document.querySelectorAll(".row")[di]?.scrollIntoView({block:"center"}); }
  } else {
    restoreState();
  }
})();
</script>
</body>
</html>
